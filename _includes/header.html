<header class="site-header">
  <div class="header-container">
    <div class="header-left">
      <a class="header-logo" href="{{ '/' | relative_url }}">
        <div class="header-logo-icon">G</div>
        <div class="header-logo-text">
          <span class="logo-white">GABRIEL</span><span class="logo-purple">CANO</span>
        </div>
      </a>
      <nav class="header-nav" aria-label="Navegação principal">
        <ul class="header-nav-list">
          {% for item in site.nav %}
          <li>
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>
              {{ item.title | upcase }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
    <div class="header-right">
      <button class="header-search-btn" aria-label="Buscar">
        <svg width="20" height="20" fill="none" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="9" cy="9" r="6" stroke="#e2e8f0" stroke-width="1.5"/>
          <path d="M13.5 13.5L17 17" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <a href="{{ '/categoria/newsletter/' | relative_url }}" class="header-subscribe-btn">ASSINAR</a>
      <button class="header-nav-toggle" aria-label="Menu" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</header>
